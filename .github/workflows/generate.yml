name: Daily Video Generator
on:
  workflow_dispatch: # ম্যানুয়ালি রান করার বাটন
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২টায় অটো রান
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - setup-python:
          python-version: '3.9'
      - run: |
          sudo apt-get update
          sudo apt-get install ffmpeg -y
          pip install -r requirements.txt
      - run: python main.py
      - uses: actions/upload-artifact@v4
        with:
          name: my-video
          path: output/final_video.mp4
          
