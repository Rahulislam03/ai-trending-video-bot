name: Daily Video Generator

on:
  workflow_dispatch: # ম্যানুয়ালি রান করার বাটন
  push:              # কোড পুশ করলে রান হবে
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন রাত ১২টায় অটো রান

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install ffmpeg -y
          pip install -r requirements.txt

      - name: Run Video Generator
        run: python main.py

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-generated-video
          path: output/final_video.mp4
          
